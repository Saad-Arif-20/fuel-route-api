<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimal Fuel Route Planner</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        :root {
            --bg-glass: rgba(15, 23, 42, 0.75);
            --border-glass: rgba(255, 255, 255, 0.1);
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        body, html { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
            background-color: #0f172a;
        }

        #map { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw; 
            height: 100vh; 
            z-index: 1;
        }

        .sidebar { 
            position: absolute;
            top: 24px;
            left: 24px;
            width: 400px;
            max-height: calc(100vh - 48px);
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            display: flex;
            flex-direction: column;
            color: var(--text-main);
        }

        .sidebar-header {
            padding: 24px 24px 16px;
            border-bottom: 1px solid var(--border-glass);
        }

        .sidebar-header h1 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-header p {
            margin: 8px 0 0 0;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .sidebar-content {
            padding: 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .scrollable-results {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            margin-top: 16px;
            padding-right: 8px;
            min-height: 0;
        }

        /* Custom Scrollbar for results */
        .scrollable-results::-webkit-scrollbar { width: 6px; }
        .scrollable-results::-webkit-scrollbar-track { background: transparent; }
        .scrollable-results::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
        .scrollable-results::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        .form-group { margin-bottom: 20px; position: relative; }
        label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 0.875rem; color: #cbd5e1; }
        
        input { 
            width: 100%; 
            padding: 12px 16px; 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass); 
            border-radius: 12px; 
            box-sizing: border-box; 
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        input::placeholder { color: #64748b; }
        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.6);
        }
        button:disabled { 
            background: #334155; 
            box-shadow: none;
            color: #94a3b8;
            cursor: not-allowed; 
            transform: none;
        }

        .loading { 
            display: none; 
            text-align: center; 
            margin-top: 16px; 
            font-size: 0.9rem;
            color: #93c5fd; 
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .results { display: flex; flex-direction: column; flex: 1; min-height: 0; }
        
        .stats { 
            background: rgba(0, 0, 0, 0.2); 
            padding: 16px; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            border: 1px solid var(--border-glass);
        }
        .stat-item { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
        .stat-item:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 6px; padding-bottom: 12px; }
        .stat-label { font-weight: 500; font-size: 0.9rem; color: var(--text-muted); }
        .stat-value { font-weight: 700; font-size: 1.1rem; }
        .cost-value { color: var(--accent); }

        .results h3 {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 16px 0;
            color: #cbd5e1;
        }

        .stop-item { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px; 
            margin-bottom: 12px; 
            border-radius: 12px; 
            position: relative;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .stop-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .stop-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--danger);
            border-radius: 12px 0 0 12px;
        }
        
        .stop-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .stop-name { font-weight: 600; font-size: 0.95rem; line-height: 1.3; padding-right: 12px; }
        .stop-price { font-size: 1.1rem; font-weight: 700; color: var(--accent); white-space: nowrap; }
        
        .stop-details { font-size: 0.85rem; color: var(--text-muted); display: flex; justify-content: space-between; }
        .stop-city { display: flex; align-items: center; gap: 4px; }
        .stop-dist { background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 10px; font-size: 0.75rem; }

        /* Autocomplete styling */
        .autocomplete-list {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: #1e293b;
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            z-index: 9999;
            max-height: 220px;
            overflow-y: auto;
            overflow-x: hidden;
        }
        .autocomplete-list::-webkit-scrollbar { width: 6px; }
        .autocomplete-list::-webkit-scrollbar-track { background: transparent; }
        .autocomplete-list::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        
        .autocomplete-list div {
            padding: 12px 16px;
            cursor: pointer;
            font-size: 0.9rem;
            color: #cbd5e1;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: background 0.1s;
        }
        .autocomplete-list div:last-child { border-bottom: none; }
        .autocomplete-list div:hover,
        .autocomplete-list div.active { background: rgba(59, 130, 246, 0.2); color: white; }
        
        /* Leaflet Dark Theme Overrides */
        .leaflet-container { background: #0f172a; }
        .leaflet-popup-content-wrapper {
            background: #1e293b;
            color: white;
            border: 1px solid var(--border-glass);
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
        }
        .leaflet-popup-tip { background: #1e293b; }
        .leaflet-popup-content b { color: #93c5fd; }
    </style>
</head>
<body>
    <div id="map"></div>
    
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>Route Planner</h1>
            <p>Smart fuel stops for commercial trucking</p>
        </div>
        <div class="sidebar-content">
            <div class="form-group">
                <label for="start">Start Location</label>
                <input type="text" id="start" placeholder="e.g. Houston, TX" autocomplete="off">
                <div class="autocomplete-list" id="start-suggestions" style="display:none;"></div>
            </div>
            <div class="form-group">
                <label for="finish">Finish Location</label>
                <input type="text" id="finish" placeholder="e.g. Chicago, IL" autocomplete="off">
                <div class="autocomplete-list" id="finish-suggestions" style="display:none;"></div>
            </div>
            
            <button id="calculateBtn">Calculate Optimal Route</button>
            <div class="loading" id="loading">Routing & Optimizing Fuel...</div>

            <div class="results" id="results" style="display: none;">
                <div class="scrollable-results">
                    <div class="stats">
                        <div class="stat-item">
                            <span class="stat-label">Total Distance</span>
                            <span class="stat-value" id="totalDist"></span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Fuel Cost Estimate</span>
                            <span class="stat-value cost-value" id="totalCost"></span>
                        </div>
                    </div>
                    <h3>Recommended Stops</h3>
                    <div id="stopsList"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Use a dark-mode optimized map tile layer (Carto Dark Matter)
        const map = L.map('map', { zoomControl: false }).setView([39.8283, -98.5795], 5);
        
        // Move zoom control to bottom right so it doesn't overlap sidebar
        L.control.zoom({ position: 'bottomright' }).addTo(map);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO'
        }).addTo(map);

        let currentRoute = null;
        let markers = [];

        function debounce(fn, delay) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
        }

        function setupAutocomplete(inputId, listId) {
            const input = document.getElementById(inputId);
            const list  = document.getElementById(listId);
            let activeIdx = -1;

            const fetchSuggestions = debounce(async (text) => {
                if (text.length < 3) { list.style.display = 'none'; return; }
                const url = `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/suggest?text=${encodeURIComponent(text)}&f=json&countryCode=USA&maxSuggestions=5`;
                try {
                    const res  = await fetch(url);
                    const data = await res.json();
                    const suggestions = data.suggestions || [];
                    if (!suggestions.length) { list.style.display = 'none'; return; }

                    list.innerHTML = '';
                    activeIdx = -1;
                    suggestions.forEach(s => {
                        const item = document.createElement('div');
                        item.textContent = s.text;
                        item.addEventListener('mousedown', (e) => {
                            e.preventDefault();
                            input.value = s.text;
                            list.style.display = 'none';
                        });
                        list.appendChild(item);
                    });
                    list.style.display = 'block';
                } catch (_) {
                    list.style.display = 'none';
                }
            }, 250);

            input.addEventListener('input', () => fetchSuggestions(input.value));

            input.addEventListener('keydown', (e) => {
                const items = list.querySelectorAll('div');
                if (!items.length) return;
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    activeIdx = Math.min(activeIdx + 1, items.length - 1);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    activeIdx = Math.max(activeIdx - 1, 0);
                } else if (e.key === 'Enter' && activeIdx >= 0) {
                    e.preventDefault();
                    input.value = items[activeIdx].textContent;
                    list.style.display = 'none';
                    activeIdx = -1;
                    return;
                } else if (e.key === 'Escape') {
                    list.style.display = 'none';
                    return;
                }
                items.forEach((el, i) => el.classList.toggle('active', i === activeIdx));
            });

            input.addEventListener('blur', () => setTimeout(() => { list.style.display = 'none'; }, 150));
        }

        setupAutocomplete('start', 'start-suggestions');
        setupAutocomplete('finish', 'finish-suggestions');

        document.getElementById('calculateBtn').addEventListener('click', async () => {
            const start  = document.getElementById('start').value;
            const finish = document.getElementById('finish').value;
            if (!start || !finish) return alert('Please enter both start and finish locations');

            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('calculateBtn').disabled = true;

            if (currentRoute) map.removeLayer(currentRoute);
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            try {
                const response = await fetch(`http://127.0.0.1:8000/api/route/?start=${encodeURIComponent(start)}&finish=${encodeURIComponent(finish)}`);
                const data = await response.json();

                if (response.ok) {
                    const latLngs = data.route_geometry.coordinates.map(coord => [coord[1], coord[0]]);
                    
                    // Premium glowing route line
                    currentRoute = L.polyline(latLngs, {
                        color: '#60a5fa', 
                        weight: 6, 
                        opacity: 0.9,
                        lineCap: 'round',
                        lineJoin: 'round'
                    }).addTo(map);
                    
                    // Add a thin inner line for depth
                    const innerRoute = L.polyline(latLngs, {
                        color: '#ffffff', weight: 2, opacity: 0.8, lineCap: 'round', lineJoin: 'round'
                    }).addTo(map);
                    
                    markers.push(innerRoute);
                    
                    // Adjust bounds, giving padding for sidebar
                    map.fitBounds(currentRoute.getBounds(), { paddingBottomRight: [50, 50], paddingTopLeft: [450, 50] });

                    // Custom markers for Start/Finish
                    const startIcon = L.divIcon({ html: '<div style="background:#3b82f6;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 0 10px rgba(0,0,0,0.5);"></div>', className: '' });
                    const finishIcon = L.divIcon({ html: '<div style="background:#10b981;width:14px;height:14px;border-radius:50%;border:3px solid white;box-shadow:0 0 10px rgba(0,0,0,0.5);"></div>', className: '' });

                    const startMarker  = L.marker(latLngs[0], {icon: startIcon}).addTo(map).bindPopup('<b>Start:</b> ' + data.start_location);
                    const finishMarker = L.marker(latLngs[latLngs.length - 1], {icon: finishIcon}).addTo(map).bindPopup('<b>Finish:</b> ' + data.finish_location);
                    markers.push(startMarker, finishMarker);

                    document.getElementById('totalDist').innerText = `${data.total_distance_miles} mi`;
                    document.getElementById('totalCost').innerText = `$${data.total_fuel_cost}`;

                    const stopsContainer = document.getElementById('stopsList');
                    stopsContainer.innerHTML = '';

                    data.fuel_stops.forEach((stop, i) => {
                        const price = stop.price.toFixed(2);
                        
                        // Fuel stop marker on map
                        const marker = L.circleMarker([stop.latitude, stop.longitude], {
                            color: '#ffffff', weight: 2, fillColor: '#ef4444', fillOpacity: 1, radius: 6
                        }).addTo(map).bindPopup(`
                            <b>${i+1}. ${stop.name}</b><br>
                            <span style="color:#10b981;font-weight:bold;font-size:1.1em;">$${price}</span> / gal<br>
                            ${stop.city}, ${stop.state}
                        `);
                        markers.push(marker);

                        // Fuel stop card in sidebar
                        const div = document.createElement('div');
                        div.className = 'stop-item';
                        div.onclick = () => { 
                            map.panTo([stop.latitude, stop.longitude], { animate: true, duration: 0.8 });
                            setTimeout(() => {
                                map.setZoom(13, { animate: true });
                                marker.openPopup();
                            }, 800);
                        };
                        div.innerHTML = `
                            <div class="stop-header">
                                <div class="stop-name">${i+1}. ${stop.name}</div>
                                <div class="stop-price">$${price}</div>
                            </div>
                            <div class="stop-details">
                                <div class="stop-city">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                                    ${stop.city}, ${stop.state}
                                </div>
                                <div class="stop-dist">${stop.distance_along_route} mi</div>
                            </div>
                        `;
                        stopsContainer.appendChild(div);
                    });

                    document.getElementById('results').style.display = 'block';
                } else {
                    alert(data.error || 'An error occurred');
                }
            } catch (e) {
                alert('Failed to connect to the API. Make sure Django is running on port 8000.');
                console.error(e);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('calculateBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
